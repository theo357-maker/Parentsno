<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne - Espace Parent CS la Colombe</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .offline-container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
        }
        
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .button {
            background: white;
            color: #667eea;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .data-info {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 0.9rem;
        }
        
        .data-info h3 {
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }
        
        .data-info ul {
            list-style: none;
            padding: 0;
        }
        
        .data-info li {
            margin: 0.5rem 0;
        }
        
        .retry {
            margin-top: 1rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
        
        .retry i {
            animation: spin 2s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>Vous êtes hors ligne</h1>
        <p>La connexion Internet a été perdue. Vous pouvez toujours consulter les données mises en cache.</p>
        
        <a href="/" class="button" onclick="checkConnection(event)">
            <i class="fas fa-sync-alt"></i> Réessayer la connexion
        </a>
        
        <div class="data-info">
            <h3><i class="fas fa-database"></i> Données disponibles hors ligne :</h3>
            <ul id="offline-data-list">
                <li><i class="fas fa-spinner fa-spin"></i> Chargement...</li>
            </ul>
        </div>
        
        <div class="retry" id="retry-message">
            <i class="fas fa-circle-notch"></i> Tentative de reconnexion automatique...
        </div>
    </div>
    
    <script>
        // Fonction pour vérifier la connexion
        function checkConnection(e) {
            e.preventDefault();
            
            if (navigator.onLine) {
                window.location.href = '/';
            } else {
                alert('Toujours hors ligne. Veuillez vérifier votre connexion Internet.');
            }
        }
        
        // Afficher les données disponibles hors ligne
        function displayOfflineData() {
            const listElement = document.getElementById('offline-data-list');
            
            if (!listElement) return;
            
            // Vérifier les données dans localStorage
            const parentData = localStorage.getItem('parentData');
            const notifications = localStorage.getItem('notifications');
            
            let items = [];
            
            if (parentData) {
                try {
                    const data = JSON.parse(parentData);
                    if (data.children && data.children.length > 0) {
                        items.push(`👤 ${data.children.length} enfant(s) enregistré(s)`);
                    }
                } catch (e) {}
            }
            
            if (notifications) {
                try {
                    const notifs = JSON.parse(notifications);
                    const unread = notifs.filter(n => !n.read).length;
                    items.push(`🔔 ${unread} notification(s) non lue(s)`);
                } catch (e) {}
            }
            
            // Vérifier les données dans IndexedDB (simulé)
            if ('serviceWorker' in navigator) {
                items.push('📚 Données des notes (cache)');
                items.push('📅 Présences récentes');
                items.push('📄 Communiqués');
            }
            
            if (items.length === 0) {
                items = ['📦 Aucune donnée en cache', '🔄 Revenez en ligne pour charger les données'];
            }
            
            listElement.innerHTML = items.map(item => `<li>${item}</li>`).join('');
        }
        
        // Tentative de reconnexion automatique
        let retryCount = 0;
        const maxRetries = 10;
        
        function attemptReconnect() {
            if (navigator.onLine) {
                window.location.reload();
            } else if (retryCount < maxRetries) {
                retryCount++;
                setTimeout(attemptReconnect, 3000);
            } else {
                document.getElementById('retry-message').innerHTML = 
                    '<i class="fas fa-exclamation-triangle"></i> Impossible de se reconnecter. Vérifiez votre connexion.';
            }
        }
        
        // Initialisation
        displayOfflineData();
        
        // Vérifier périodiquement la connexion
        window.addEventListener('online', () => {
            window.location.reload();
        });
        
        // Lancer les tentatives de reconnexion
        setTimeout(attemptReconnect, 3000);
    </script>
</body>
</html>
